name: deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          install-quarto: false
          cache: always
          packages: |
            any::dplyr
            any::tidyr
            any::stringr
            any::htmlTable
            any::kableExtra
            any::formattable
            any::DT
            any::gt
            any::reactable
            any::ggplot2
            any::highcharter
            any::plotly
            any::ggiraph
            any::dygraphs
            any::networkD3
            any::leaflet
            any::crosstalk
            any::fontawesome
            any::knitr

      - name: Setup quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.35
      - run: quarto --version
      - run: quarto add --no-prompt quarto-ext/fontawesome
      - run: quarto add --no-prompt mcanouil/quarto-collapse-output@1.4.0
      - run: quarto add --no-prompt royfrancis/quarto-reveal-logo
      - run: quarto add --no-prompt royfrancis/quarto-accordion
      - run: quarto add --no-prompt royfrancis/quarto-leaflet

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2

      - name: Configure Github Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
